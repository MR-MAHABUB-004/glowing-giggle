<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoatBot Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --accent: #7c6af7;
    --green: #22c55e;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 24px; }
  h1 { font-size: 1.6rem; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .card-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .card-value { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
  .card-sub { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
  th { text-align: left; padding: 12px 16px; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; font-size: 0.85rem; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 0.7rem; font-weight: 600; }
  .tag-priv { background: #1e3a5f; color: #60a5fa; }
  .tag-group { background: #1e3a2f; color: #4ade80; }
</style>
</head>
<body>
<h1>🐐 GoatBot Dashboard</h1>
<p class="sub"><span class="dot"></span>Live — refreshes every 10s</p>

<div class="grid" id="stats-grid"></div>

<p class="section-title">Recent Users</p>
<table id="users-table">
  <thead><tr><th>#</th><th>Name</th><th>Username</th><th>Type</th><th>Last Seen</th></tr></thead>
  <tbody id="users-body"></tbody>
</table>

<script>
async function refresh() {
  try {
    const r = await fetch('/api/stats');
    const d = await r.json();
    if (!d.ok) return;

    const grid = document.getElementById('stats-grid');
    grid.innerHTML = [
      { label: 'Uptime',    value: d.uptime,           sub: '' },
      { label: 'Commands',  value: d.commands,         sub: '' },
      { label: 'Events',    value: d.events,           sub: '' },
      { label: 'Chats',     value: d.counts.total,     sub: `${d.counts.groups} groups · ${d.counts.users} users` },
      { label: 'Memory',    value: `${d.memory.used}MB`, sub: `of ${d.memory.total}MB` },
      { label: 'Bot',       value: '@' + (d.bot.username || '?'), sub: `ID: ${d.bot.id || '?'}` },
    ].map(c => `
      <div class="card">
        <div class="card-label">${c.label}</div>
        <div class="card-value">${c.value}</div>
        ${c.sub ? `<div class="card-sub">${c.sub}</div>` : ''}
      </div>`).join('');

    const tbody = document.getElementById('users-body');
    if (!d.users?.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="color:var(--muted);text-align:center">No users yet</td></tr>';
    } else {
      tbody.innerHTML = d.users.map((u, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${u.name || '—'}</td>
          <td>${u.username ? '@' + u.username : '—'}</td>
          <td><span class="tag tag-priv">private</span></td>
          <td>${new Date(u.lastSeen).toLocaleString()}</td>
        </tr>`).join('');
    }
  } catch(e) { console.error(e); }
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
